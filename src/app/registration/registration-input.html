<mat-card class="registration-card">
    <mat-card-content>
        <div class="registration-row">
            <mat-form-field>
                <input matInput placeholder="User Name">
            </mat-form-field>
            <mat-form-field>
                <input matInput placeholder="Password" type="password" required>
            </mat-form-field>
            <button matButton="outlined" color="primary">Register</button>
        </div>
    </mat-card-content>
</mat-card>
